<!DOCTYPE >
< lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white">
            <div class="p-6">
                <h1 class="text-2xl font-bold">Dashboard</h1>
            </div>
            <nav class="mt-6">
                <a href="#" class="block py-3 px-6 hover:bg-gray-700">Overview</a>
                <a href="#" class="block py-3 px-6 hover:bg-gray-700">Analytics</a>
                <a href="#" class="block py-3 px-6 hover:bg-gray-700">Reports</a>
                <a href="#" class="block py-3 px-6 hover:bg-gray-700">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
                <p class="text-gray-600">Here's what's happening today.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="font-bold text-lg mb-2">Users</h3>
                    <p class="text-3xl font-bold text-blue-600">1,254</p>
                    <img src="https://source.unsplash.com/800x600/?people" class="mt-4 rounded w-full h-40 object-cover" />
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="font-bold text-lg mb-2">Revenue</h3>
                    <p class="text-3xl font-bold text-green-600">$24,580</p>
                    <img src="https://source.unsplash.com/800x600/?money" class="mt-4 rounded w-full h-40 object-cover" />
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="font-bold text-lg mb-2">Performance</h3>
                    <p class="text-3xl font-bold text-purple-600">89%</p>
                    <img src="https://source.unsplash.com/800x600/?chart" class="mt-4 rounded w-full h-40 object-cover" />
                </div>
            </div>

            <div class="mt-8 bg-white p-6 rounded-lg shadow">
                <h3 class="font-bold text-xl mb-4">Recent Activity</h3>
                <div class="space-y-4">
                    <div class="flex items-center border-b pb-4">
                        <img src="https://source.unsplash.com/100x100/?profile" class="w-12 h-12 rounded-full mr-4" />
                        <div>
                            <p class="font-semibold">User login detected</p>
                            <p class="text-gray-500 text-sm">2 minutes ago</p>
                        </div>
                    </div>
                    <div class="flex items-center border-b pb-4">
                        <img src="https://source.unsplash.com/100x100/?data" class="w-12 h-12 rounded-full mr-4" />
                        <div>
                            <p class="font-semibold">Report generated</p>
                            <p class="text-gray-500 text-sm">1 hour ago</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</>

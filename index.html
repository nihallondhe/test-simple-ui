<!DOCTYPE >
< lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Logo</div>
            <div class="space-x-4">
                <a href="#" class="px-4 py-2 text-gray-700 hover:text-blue-600">Home</a>
                <a href="#" class="px-4 py-2 text-gray-700 hover:text-blue-600">Login</a>
                <a href="#" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Sign Up</a>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <section class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Welcome to Our Site</h1>
            <p class="text-gray-600 max-w-2xl mx-auto">This is a simple example page with a header containing navigation buttons.</p>
        </section>

        <section class="grid md:grid-cols-2 gap-8">
            <div>
                <img src="https://source.unsplash.com/800x600/?nature" alt="Nature" class="w-full h-64 object-cover rounded-lg shadow">
                <h2 class="text-2xl font-semibold mt-4 mb-2">Beautiful Nature</h2>
                <p class="text-gray-600">Enjoy this serene image from Unsplash.</p>
            </div>
            <div>
                <img src="https://source.unsplash.com/800x600/?city" alt="City" class="w-full h-64 object-cover rounded-lg shadow">
                <h2 class="text-2xl font-semibold mt-4 mb-2">Urban Life</h2>
                <p class="text-gray-600">A glimpse of city life and architecture.</p>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-6 text-center">
            <p>&copy; 2023 Simple Site. All rights reserved.</p>
        </div>
    </footer>
</body>
</>

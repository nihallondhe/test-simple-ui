<!DOCTYPE >
< lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-100 flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden">
        <img src="https://source.unsplash.com/1920x1080/?technology,abstract" alt="Background" class="w-full h-full object-cover opacity-30">
    </div>
    
    <div class="glass rounded-3xl shadow-2xl p-8 md:p-12 max-w-4xl w-full mx-auto relative z-10">
        <div class="flex flex-col md:flex-row items-center gap-8 md:gap-12">
            <div class="md:w-1/2">
                <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
                    Innovate Your Digital Experience
                </h1>
                <p class="text-gray-600 mb-8 text-lg">
                    Discover cutting-edge solutions that transform ideas into reality. Join thousands who have elevated their journey.
                </p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition duration-300 shadow-lg">
                        Get Started Free
                    </button>
                    <button class="glass hover:bg-white/30 text-gray-800 font-semibold py-3 px-8 rounded-xl transition duration-300">
                        Learn More
                    </button>
                </div>
                <p class="text-gray-500 text-sm mt-6">
                    No credit card required • 14-day free trial
                </p>
            </div>
            
            <div class="md:w-1/2">
                <div class="relative">
                    <div class="glass rounded-2xl overflow-hidden shadow-xl">
                        <img src="https://source.unsplash.com/600x400/?dashboard,ui" alt="Dashboard Preview" class="w-full h-auto">
                    </div>
                    <div class="absolute -bottom-4 -right-4 glass rounded-xl p-4 shadow-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-r from-green-400 to-blue-500"></div>
                            <div>
                                <p class="font-semibold text-gray-800">Live Preview</p>
                                <p class="text-sm text-gray-600">Interactive demo</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</>
